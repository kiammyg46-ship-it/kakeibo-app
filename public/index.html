<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset = "UTF-8">
    <title>家計簿アプリ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>家計簿アプリ</h1>

    <h2>入力</h2>
    <input id="amount" type="number" placeholder="金額">
    <input id="category" type="text" placeholder="カテゴリ">
    <input id="date" type="date">
    <input id="memo" type="text" placeholder="メモ">
    <button id ="submitButton" onclick="addExpense()">追加</button>

    <h2>一覧</h2>
    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>金額</th>
                <th>カテゴリ</th>
                <th>日付</th>
                <th>メモ</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="expenseList"></tbody>
    </table>

    <h3>合計金額: <span id="totalAmount">0</span> 円</h3>

    <script src="script.js"></script>
</body>
</html>
